services:
  - type: web
    name: opertech-web
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opertech-db
          property: connectionString

databases:
  - name: opertech-db
    plan: starter
